<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Search</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: "Segoe UI Variable Text", "Microsoft YaHei UI", sans-serif;
        background: #f7f8fb;
        color: #1f1f1f;
      }

      .card {
        border: 1px solid #d9dfe9;
        border-radius: 10px;
        background: #fff;
        padding: 10px;
      }

      .title {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
      }

      .desc {
        margin: 6px 0 0;
        color: #647188;
        font-size: 12px;
      }

      .action {
        margin-top: 10px;
        border: 1px solid #9fb2f7;
        border-radius: 8px;
        background: #eef3ff;
        padding: 8px 10px;
        cursor: pointer;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="title">文件搜索</p>
      <p class="desc" id="desc">输入关键词后，回车会调用系统文件搜索。</p>
      <button id="action" class="action" type="button">打开系统文件搜索</button>
    </div>

    <script>
      const desc = document.getElementById("desc");
      const action = document.getElementById("action");
      let currentQuery = "";

      function runSearch() {
        const value = currentQuery.trim();
        if (!value) {
          return;
        }
        parent.postMessage(
          {
            type: "jtools-plugin-action",
            action: "open_url",
            url: `search-ms:query=${encodeURIComponent(value)}`,
          },
          "*",
        );
      }

      function hookItems(query) {
        const value = query.trim();
        if (!value) {
          return [];
        }
        return [
          {
            title: `搜索文件 "${value}"`,
            subtitle: "Windows 文件搜索",
            score: 84,
            action: { open_url: `search-ms:query=${encodeURIComponent(value)}` },
          },
        ];
      }

      action.addEventListener("click", runSearch);

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type === "jtools-host-query") {
          currentQuery = String(data.query || "");
          const value = currentQuery.trim();
          desc.textContent = value
            ? `当前关键词: ${value}`
            : "输入关键词后，回车会调用系统文件搜索。";
        } else if (data.type === "jtools-host-submit") {
          runSearch();
        } else if (data.type === "jtools-hook-search") {
          parent.postMessage(
            {
              type: "jtools-hook-results",
              pluginId: "file-search",
              token: Number(data.token || 0),
              items: hookItems(String(data.query || "")),
            },
            "*",
          );
        }
      });

      parent.postMessage({ type: "jtools-plugin-ready" }, "*");
    </script>
  </body>
</html>
