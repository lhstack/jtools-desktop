<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Launcher</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: "Segoe UI Variable Text", "Microsoft YaHei UI", sans-serif;
        background: #f7f8fb;
      }

      .hint {
        margin: 0;
        padding: 8px 10px;
        border: 1px dashed #d4dbea;
        border-radius: 10px;
        background: #fff;
        color: #65758e;
        font-size: 12px;
      }

      .list {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .item {
        border: 1px solid #d7dff3;
        border-radius: 10px;
        background: #fff;
        padding: 9px 10px;
        text-align: left;
        cursor: pointer;
      }

      .item:hover {
        border-color: #98adff;
        background: #edf2ff;
      }

      .title {
        display: block;
        font-size: 14px;
        font-weight: 700;
        color: #1f1f1f;
      }

      .subtitle {
        display: block;
        margin-top: 2px;
        font-size: 12px;
        color: #6a7892;
      }
    </style>
  </head>
  <body>
    <p class="hint" id="hint">输入关键词后，插件会给出应用启动候选。</p>
    <div id="list" class="list"></div>

    <script>
      const hint = document.getElementById("hint");
      const list = document.getElementById("list");
      const appMap = [
        { key: ["设置", "setting", "settings"], title: "打开系统设置", url: "ms-settings:" },
        { key: ["控制台", "cmd", "终端"], title: "打开命令提示符", url: "cmd.exe" },
        { key: ["资源管理器", "explorer", "文件管理"], title: "打开资源管理器", url: "explorer.exe" },
        { key: ["记事本", "notepad"], title: "打开记事本", url: "notepad.exe" },
      ];
      let currentItems = [];

      function searchApps(query) {
        const value = query.trim().toLowerCase();
        if (!value) {
          return [];
        }
        return appMap
          .filter((app) => app.key.some((key) => key.includes(value) || value.includes(key)))
          .map((app) => ({
            title: app.title,
            subtitle: app.url,
            action: { type: "open_url", url: app.url },
          }));
      }

      function trigger(item) {
        if (!item) {
          return;
        }
        parent.postMessage(
          {
            type: "jtools-plugin-action",
            action: "open_url",
            url: item.action.url,
          },
          "*",
        );
      }

      function render(query) {
        currentItems = searchApps(query);
        list.innerHTML = "";
        if (currentItems.length === 0) {
          hint.textContent = "没有匹配的应用关键词。";
          return;
        }
        hint.textContent = `匹配 ${currentItems.length} 项，点击即可启动。`;
        for (const item of currentItems) {
          const button = document.createElement("button");
          button.className = "item";
          button.type = "button";
          button.innerHTML = `<span class="title">${item.title}</span><span class="subtitle">${item.subtitle}</span>`;
          button.addEventListener("click", () => trigger(item));
          button.addEventListener("dblclick", () => trigger(item));
          list.appendChild(button);
        }
      }

      function hookItems(query) {
        return searchApps(query).map((item, index) => ({
          title: item.title,
          subtitle: item.subtitle,
          score: 83 - index * 2,
          action: { open_url: item.action.url },
        }));
      }

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type === "jtools-host-query") {
          render(String(data.query || ""));
        } else if (data.type === "jtools-host-submit") {
          trigger(currentItems[0]);
        } else if (data.type === "jtools-hook-search") {
          parent.postMessage(
            {
              type: "jtools-hook-results",
              pluginId: "app-launcher",
              token: Number(data.token || 0),
              items: hookItems(String(data.query || "")),
            },
            "*",
          );
        }
      });

      parent.postMessage({ type: "jtools-plugin-ready" }, "*");
    </script>
  </body>
</html>
