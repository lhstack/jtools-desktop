<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encoding Tools</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --panel-bg: #f7f9ff;
        --card-bg: #ffffff;
        --border: #d9def2;
        --primary: #5b5bd6;
        --text: #162037;
        --muted: #5f6b87;
        --mono: "Cascadia Mono", "Consolas", monospace;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 12px;
        min-width: 600px;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI Variable Text", "Microsoft YaHei UI", sans-serif;
      }
      .panel {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel-bg);
        padding: 12px 12px 16px;
      }
      .hint {
        margin: 0 0 10px;
        color: var(--muted);
        font-size: 12px;
      }
      .list {
        display: grid;
        gap: 8px;
        padding-right: 0;
        padding-bottom: 16px;
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card-bg);
        padding: 10px 12px;
      }
      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .card-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }
      .copy-btn {
        border: 1px solid #c8d3fb;
        border-radius: 8px;
        background: #eef2ff;
        color: #2a4ac8;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        padding: 6px 10px;
        cursor: pointer;
      }
      .copy-btn:hover {
        background: #e4ebff;
      }
      .copy-btn:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }
      .card-body {
        margin-top: 8px;
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 8px;
      }
      .kv {
        min-width: 0;
      }
      .label {
        color: var(--muted);
        font-size: 12px;
      }
      .value {
        margin-top: 2px;
        font-size: 13px;
        color: #2d3a58;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .value.result {
        font-family: var(--mono);
        color: #1c2a4c;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <p class="hint">
        启动器中可直接输入：<code>md5 内容</code>、<code>sha256 内容</code>、<code>base64 内容</code>、<code>hex 内容</code>、
        <code>url 内容</code>、<code>unicode 内容</code>（以及对应反解关键词）。
      </p>
      <section id="cards" class="list"></section>
    </main>
    <script>
      const PLUGIN_ID = "encoding-tools";
      const EMPTY_VALUE = "—";
      const INVALID_VALUE = "无法解码";
      const cardsEl = document.getElementById("cards");
      const panelEl = document.querySelector(".panel");

      let activeInput = "";
      let renderToken = 0;

      const OPERATIONS = [
        { id: "md5", label: "MD5", mode: "hash-md5" },
        { id: "sha1", label: "SHA1", mode: "hash-sha-1" },
        { id: "sha256", label: "SHA256", mode: "hash-sha-256" },
        { id: "sha512", label: "SHA512", mode: "hash-sha-512" },
        { id: "base64-encode", label: "Base64 编码", mode: "base64-encode" },
        { id: "base64-decode", label: "Base64 解码", mode: "base64-decode" },
        { id: "hex-encode", label: "HEX 编码", mode: "hex-encode" },
        { id: "hex-decode", label: "HEX 解码", mode: "hex-decode" },
        { id: "url-encode", label: "URL 编码", mode: "url-encode" },
        { id: "url-decode", label: "URL 解码", mode: "url-decode" },
        { id: "unicode-encode", label: "Unicode 编码", mode: "unicode-encode" },
        { id: "unicode-decode", label: "Unicode 解码", mode: "unicode-decode" },
      ];

      const SEARCH_ALIAS = new Map([
        ["md5", "md5"],
        ["sha1", "sha1"],
        ["sha256", "sha256"],
        ["sha512", "sha512"],
        ["base64", "base64-encode"],
        ["unbase64", "base64-decode"],
        ["base64d", "base64-decode"],
        ["hex", "hex-encode"],
        ["unhex", "hex-decode"],
        ["hexd", "hex-decode"],
        ["url", "url-encode"],
        ["unurl", "url-decode"],
        ["unicode", "unicode-encode"],
        ["ununicode", "unicode-decode"],
      ]);

      const encoder = new TextEncoder();
      const decoder = new TextDecoder();

      function htmlEscape(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function sendCopy(text) {
        window.parent.postMessage(
          {
            type: "jtools-plugin-action",
            action: "copy_text",
            text,
          },
          "*",
        );
      }

      function reportPluginHeight() {
        window.requestAnimationFrame(() => {
          const panelHeight = panelEl ? panelEl.scrollHeight : 0;
          const bodyStyle = window.getComputedStyle(document.body);
          const bodyPaddingTop = Number.parseFloat(bodyStyle.paddingTop || "0");
          const bodyPaddingBottom = Number.parseFloat(bodyStyle.paddingBottom || "0");
          const height = Math.ceil(panelHeight + bodyPaddingTop + bodyPaddingBottom + 4);
          window.parent.postMessage(
            {
              type: "jtools-plugin-height",
              height,
            },
            "*",
          );
        });
      }

      function toHex(bytes) {
        return Array.from(bytes)
          .map((part) => part.toString(16).padStart(2, "0"))
          .join("");
      }

      function parseHex(hex) {
        const value = String(hex).trim().toLowerCase();
        if (!value || value.length % 2 !== 0 || /[^0-9a-f]/.test(value)) {
          throw new Error("invalid hex");
        }
        const bytes = new Uint8Array(value.length / 2);
        for (let i = 0; i < value.length; i += 2) {
          bytes[i / 2] = parseInt(value.slice(i, i + 2), 16);
        }
        return bytes;
      }

      function bytesToBase64(bytes) {
        let binary = "";
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary);
      }

      function base64ToBytes(value) {
        const compact = String(value).trim().replace(/\s+/g, "");
        const binary = atob(compact);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
      }

      function unicodeEncode(value) {
        let output = "";
        for (let i = 0; i < value.length; i += 1) {
          output += "\\u" + value.charCodeAt(i).toString(16).padStart(4, "0");
        }
        return output;
      }

      function unicodeDecode(value) {
        const compact = String(value).trim().replace(/\s+/g, "");
        if (!compact || !/^((\\u[0-9a-fA-F]{4})+)$/.test(compact)) {
          throw new Error("invalid unicode sequence");
        }
        return compact.replace(/\\u([0-9a-fA-F]{4})/g, (_all, hex) =>
          String.fromCharCode(parseInt(hex, 16)),
        );
      }

      function safeDecodeUrl(value) {
        try {
          return decodeURIComponent(value);
        } catch (_error) {
          throw new Error("invalid url");
        }
      }

      async function hashWithWebCrypto(algorithm, value) {
        const bytes = encoder.encode(value);
        const digest = await crypto.subtle.digest(algorithm, bytes);
        return toHex(new Uint8Array(digest));
      }

      function md5Hex(value) {
        function add32(a, b) {
          return (a + b) & 0xffffffff;
        }
        function cmn(q, a, b, x, s, t) {
          a = add32(add32(a, q), add32(x, t));
          return add32((a << s) | (a >>> (32 - s)), b);
        }
        function ff(a, b, c, d, x, s, t) {
          return cmn((b & c) | (~b & d), a, b, x, s, t);
        }
        function gg(a, b, c, d, x, s, t) {
          return cmn((b & d) | (c & ~d), a, b, x, s, t);
        }
        function hh(a, b, c, d, x, s, t) {
          return cmn(b ^ c ^ d, a, b, x, s, t);
        }
        function ii(a, b, c, d, x, s, t) {
          return cmn(c ^ (b | ~d), a, b, x, s, t);
        }
        function md5cycle(state, x) {
          let [a, b, c, d] = state;
          a = ff(a, b, c, d, x[0], 7, -680876936);
          d = ff(d, a, b, c, x[1], 12, -389564586);
          c = ff(c, d, a, b, x[2], 17, 606105819);
          b = ff(b, c, d, a, x[3], 22, -1044525330);
          a = ff(a, b, c, d, x[4], 7, -176418897);
          d = ff(d, a, b, c, x[5], 12, 1200080426);
          c = ff(c, d, a, b, x[6], 17, -1473231341);
          b = ff(b, c, d, a, x[7], 22, -45705983);
          a = ff(a, b, c, d, x[8], 7, 1770035416);
          d = ff(d, a, b, c, x[9], 12, -1958414417);
          c = ff(c, d, a, b, x[10], 17, -42063);
          b = ff(b, c, d, a, x[11], 22, -1990404162);
          a = ff(a, b, c, d, x[12], 7, 1804603682);
          d = ff(d, a, b, c, x[13], 12, -40341101);
          c = ff(c, d, a, b, x[14], 17, -1502002290);
          b = ff(b, c, d, a, x[15], 22, 1236535329);
          a = gg(a, b, c, d, x[1], 5, -165796510);
          d = gg(d, a, b, c, x[6], 9, -1069501632);
          c = gg(c, d, a, b, x[11], 14, 643717713);
          b = gg(b, c, d, a, x[0], 20, -373897302);
          a = gg(a, b, c, d, x[5], 5, -701558691);
          d = gg(d, a, b, c, x[10], 9, 38016083);
          c = gg(c, d, a, b, x[15], 14, -660478335);
          b = gg(b, c, d, a, x[4], 20, -405537848);
          a = gg(a, b, c, d, x[9], 5, 568446438);
          d = gg(d, a, b, c, x[14], 9, -1019803690);
          c = gg(c, d, a, b, x[3], 14, -187363961);
          b = gg(b, c, d, a, x[8], 20, 1163531501);
          a = gg(a, b, c, d, x[13], 5, -1444681467);
          d = gg(d, a, b, c, x[2], 9, -51403784);
          c = gg(c, d, a, b, x[7], 14, 1735328473);
          b = gg(b, c, d, a, x[12], 20, -1926607734);
          a = hh(a, b, c, d, x[5], 4, -378558);
          d = hh(d, a, b, c, x[8], 11, -2022574463);
          c = hh(c, d, a, b, x[11], 16, 1839030562);
          b = hh(b, c, d, a, x[14], 23, -35309556);
          a = hh(a, b, c, d, x[1], 4, -1530992060);
          d = hh(d, a, b, c, x[4], 11, 1272893353);
          c = hh(c, d, a, b, x[7], 16, -155497632);
          b = hh(b, c, d, a, x[10], 23, -1094730640);
          a = hh(a, b, c, d, x[13], 4, 681279174);
          d = hh(d, a, b, c, x[0], 11, -358537222);
          c = hh(c, d, a, b, x[3], 16, -722521979);
          b = hh(b, c, d, a, x[6], 23, 76029189);
          a = hh(a, b, c, d, x[9], 4, -640364487);
          d = hh(d, a, b, c, x[12], 11, -421815835);
          c = hh(c, d, a, b, x[15], 16, 530742520);
          b = hh(b, c, d, a, x[2], 23, -995338651);
          a = ii(a, b, c, d, x[0], 6, -198630844);
          d = ii(d, a, b, c, x[7], 10, 1126891415);
          c = ii(c, d, a, b, x[14], 15, -1416354905);
          b = ii(b, c, d, a, x[5], 21, -57434055);
          a = ii(a, b, c, d, x[12], 6, 1700485571);
          d = ii(d, a, b, c, x[3], 10, -1894986606);
          c = ii(c, d, a, b, x[10], 15, -1051523);
          b = ii(b, c, d, a, x[1], 21, -2054922799);
          a = ii(a, b, c, d, x[8], 6, 1873313359);
          d = ii(d, a, b, c, x[15], 10, -30611744);
          c = ii(c, d, a, b, x[6], 15, -1560198380);
          b = ii(b, c, d, a, x[13], 21, 1309151649);
          a = ii(a, b, c, d, x[4], 6, -145523070);
          d = ii(d, a, b, c, x[11], 10, -1120210379);
          c = ii(c, d, a, b, x[2], 15, 718787259);
          b = ii(b, c, d, a, x[9], 21, -343485551);
          state[0] = add32(a, state[0]);
          state[1] = add32(b, state[1]);
          state[2] = add32(c, state[2]);
          state[3] = add32(d, state[3]);
        }
        function md5blk_array(bytes) {
          const md5blks = [];
          for (let i = 0; i < 64; i += 4) {
            md5blks[i >> 2] = bytes[i] + (bytes[i + 1] << 8) + (bytes[i + 2] << 16) + (bytes[i + 3] << 24);
          }
          return md5blks;
        }
        function rhex(n) {
          let s = "";
          for (let j = 0; j < 4; j += 1) {
            s += ("0" + ((n >> (j * 8)) & 255).toString(16)).slice(-2);
          }
          return s;
        }
        const bytes = Array.from(encoder.encode(value));
        const state = [1732584193, -271733879, -1732584194, 271733878];
        let i;
        for (i = 64; i <= bytes.length; i += 64) {
          md5cycle(state, md5blk_array(bytes.slice(i - 64, i)));
        }
        const tail = new Array(64).fill(0);
        const rem = bytes.slice(i - 64);
        for (let j = 0; j < rem.length; j += 1) {
          tail[j] = rem[j];
        }
        tail[rem.length] = 128;
        if (rem.length > 55) {
          md5cycle(state, md5blk_array(tail));
          for (let j = 0; j < 64; j += 1) {
            tail[j] = 0;
          }
        }
        const bitLength = bytes.length * 8;
        tail[56] = bitLength & 255;
        tail[57] = (bitLength >>> 8) & 255;
        tail[58] = (bitLength >>> 16) & 255;
        tail[59] = (bitLength >>> 24) & 255;
        md5cycle(state, md5blk_array(tail));
        return state.map(rhex).join("");
      }

      async function computeValue(mode, input) {
        if (!input) {
          return EMPTY_VALUE;
        }
        try {
          if (mode === "hash-md5") {
            return md5Hex(input);
          }
          if (mode === "hash-sha-1") {
            return await hashWithWebCrypto("SHA-1", input);
          }
          if (mode === "hash-sha-256") {
            return await hashWithWebCrypto("SHA-256", input);
          }
          if (mode === "hash-sha-512") {
            return await hashWithWebCrypto("SHA-512", input);
          }
          if (mode === "base64-encode") {
            return bytesToBase64(encoder.encode(input));
          }
          if (mode === "base64-decode") {
            return decoder.decode(base64ToBytes(input));
          }
          if (mode === "hex-encode") {
            return toHex(encoder.encode(input));
          }
          if (mode === "hex-decode") {
            return decoder.decode(parseHex(input));
          }
          if (mode === "url-encode") {
            return encodeURIComponent(input);
          }
          if (mode === "url-decode") {
            return safeDecodeUrl(input);
          }
          if (mode === "unicode-encode") {
            return unicodeEncode(input);
          }
          if (mode === "unicode-decode") {
            return unicodeDecode(input);
          }
          return EMPTY_VALUE;
        } catch (_error) {
          return INVALID_VALUE;
        }
      }

      async function renderCards(input) {
        const token = ++renderToken;
        const rows = await Promise.all(
          OPERATIONS.map(async (operation) => ({
            ...operation,
            input,
            output: await computeValue(operation.mode, input),
          })),
        );
        if (token !== renderToken) {
          return;
        }

        cardsEl.innerHTML = rows
          .map((row) => {
            const canCopy = row.output !== EMPTY_VALUE && row.output !== INVALID_VALUE;
            return `
            <article class="card">
              <div class="card-head">
                <strong class="card-title">${htmlEscape(row.label)}</strong>
                <button class="copy-btn" type="button" data-copy-id="${row.id}" data-copy-value="${htmlEscape(row.output)}" ${canCopy ? "" : "disabled"}>复制</button>
              </div>
              <div class="card-body">
                <div class="kv">
                  <div class="label">输入值</div>
                  <div class="value" title="${htmlEscape(row.input || EMPTY_VALUE)}">${htmlEscape(row.input || EMPTY_VALUE)}</div>
                </div>
                <div class="kv">
                  <div class="label">结果</div>
                  <div class="value result" title="${htmlEscape(row.output)}">${htmlEscape(row.output)}</div>
                </div>
              </div>
            </article>
          `;
          })
          .join("");

        cardsEl.querySelectorAll(".copy-btn[data-copy-id]").forEach((button) => {
          button.addEventListener("click", () => {
            const target = button;
            const value = target.dataset.copyValue || "";
            if (!value || value === EMPTY_VALUE || value === INVALID_VALUE) {
              return;
            }
            sendCopy(value);
            const prev = target.textContent || "复制";
            target.textContent = "已复制 ✓";
            window.setTimeout(() => {
              target.textContent = prev;
            }, 1200);
          });
        });
        reportPluginHeight();
      }

      function parseHookQuery(query) {
        const match = String(query || "")
          .trim()
          .match(/^(\S+)\s+([\s\S]+)$/);
        if (!match) {
          return null;
        }
        const command = match[1].toLowerCase();
        const payload = match[2].trim();
        if (!payload) {
          return null;
        }
        const opId = SEARCH_ALIAS.get(command);
        if (!opId) {
          return null;
        }
        const op = OPERATIONS.find((item) => item.id === opId);
        if (!op) {
          return null;
        }
        return { op, payload };
      }

      async function buildHookItems(query) {
        const parsed = parseHookQuery(query);
        if (!parsed) {
          return [];
        }
        const output = await computeValue(parsed.op.mode, parsed.payload);
        return [
          {
            title: output,
            subtitle: `${parsed.op.label} · 点击复制`,
            score: 99,
            action: { copy_text: output },
          },
        ];
      }

      async function updateInput(value) {
        activeInput = String(value || "");
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        await renderCards(activeInput);
        reportPluginHeight();
      }

      window.addEventListener("message", async (event) => {
        const data = event.data || {};
        if (data.type === "jtools-host-query") {
          await updateInput(String(data.query || ""));
          return;
        }
        if (data.type === "jtools-host-submit") {
          const first = await computeValue("hash-md5", activeInput);
          if (first !== EMPTY_VALUE && first !== INVALID_VALUE) {
            sendCopy(first);
          }
          return;
        }
        if (data.type === "jtools-hook-search") {
          const token = Number(data.token || 0);
          const items = await buildHookItems(String(data.query || ""));
          window.parent.postMessage(
            {
              type: "jtools-hook-results",
              pluginId: PLUGIN_ID,
              token,
              items,
            },
            "*",
          );
        }
      });

      void updateInput("");
      reportPluginHeight();
      window.parent.postMessage({ type: "jtools-plugin-ready" }, "*");
    </script>
  </body>
</html>
