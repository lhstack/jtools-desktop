name: build-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            runner: windows-2025
            webview2_arch: x64
            args: --config src-tauri/tauri.windows.conf.json --bundles nsis
          - name: windows-arm64
            runner: windows-11-arm
            webview2_arch: arm64
            args: --config src-tauri/tauri.windows.conf.json --bundles nsis
          - name: macos-aarch64
            runner: macos-15
            args: --bundles app,dmg
          - name: macos-x86_64
            runner: macos-15-intel
            args: --bundles app,dmg
          - name: linux-amd64
            runner: ubuntu-24.04
            args: --bundles appimage,deb
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            args: --bundles appimage,deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Prepare WebView2Loader.dll
        if: startsWith(matrix.runner, 'windows')
        shell: pwsh
        run: |
          $arch = '${{ matrix.webview2_arch }}'
          if ([string]::IsNullOrWhiteSpace($arch)) {
            throw "matrix.webview2_arch is empty"
          }

          $pkgPath = Join-Path $env:RUNNER_TEMP "Microsoft.Web.WebView2.nupkg"
          $extractDir = Join-Path $env:RUNNER_TEMP "webview2_pkg"

          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2" -OutFile $pkgPath
          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }
          Expand-Archive -Path $pkgPath -DestinationPath $extractDir -Force

          $source = Join-Path $extractDir "build/native/$arch/WebView2Loader.dll"
          if (!(Test-Path $source)) {
            throw "WebView2Loader.dll not found at $source"
          }

          New-Item -ItemType Directory -Force -Path "src-tauri/target/release" | Out-Null
          Copy-Item $source "src-tauri/target/release/WebView2Loader.dll" -Force
          Write-Host "Prepared WebView2Loader.dll for $arch"

      - name: Build Tauri bundles and upload to GitHub Release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: jtools ${{ github.ref_name }}
          releaseBody: Automated build for ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          tauriScript: bun tauri
          args: ${{ matrix.args }}

      - name: Normalize artifact paths
        if: steps.tauri_build.outputs.artifactPaths != '' && steps.tauri_build.outputs.artifactPaths != '[]'
        id: artifact_paths
        shell: pwsh
        run: |
          $raw = '${{ steps.tauri_build.outputs.artifactPaths }}'
          if ([string]::IsNullOrWhiteSpace($raw) -or $raw -eq '[]') {
            exit 0
          }
          $paths = $raw | ConvertFrom-Json
          if ($paths -is [string]) {
            $paths = @($paths)
          }
          "paths<<EOF" >> $env:GITHUB_OUTPUT
          foreach ($item in $paths) {
            "$item" >> $env:GITHUB_OUTPUT
          }
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifacts
        if: steps.artifact_paths.outputs.paths != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ steps.artifact_paths.outputs.paths }}
          if-no-files-found: error
